<!DOCTYPE html>
<html>

<head>
    <title>CR's AA Wordle</title>

    <meta charset="UTF-8">
    <meta name="author" content="CR's AA">
    <link rel="stylesheet" href="game.css">
</head>

<body>
    <button id="homeButton" type="button" onclick="location.href='index.html'">Back to Home</button>

    <header>
        <img class="logo" src="imgs/logo.png">
    </header>

    <p id="lives">You have 3 lives</p>
    <p id="score">Score: 0</p>

    <table>

        <tr>
            <td id="r1c1"></td>
            <td id="r1c2"></td>
            <td id="r1c3"></td>
            <td id="r1c4"></td>
            <td id="r1c5"></td>
        </tr>

        <tr>
            <td id="r2c1"></td>
            <td id="r2c2"></td>
            <td id="r2c3"></td>
            <td id="r2c4"></td>
            <td id="r2c5"></td>
        </tr>

        <tr>
            <td id="r3c1"></td>
            <td id="r3c2"></td>
            <td id="r3c3"></td>
            <td id="r3c4"></td>
            <td id="r3c5"></td>
        </tr>

        <tr>
            <td id="r4c1"></td>
            <td id="r4c2"></td>
            <td id="r4c3"></td>
            <td id="r4c4"></td>
            <td id="r4c5"></td>
        </tr>

        <tr>
            <td id="r5c1"></td>
            <td id="r5c2"></td>
            <td id="r5c3"></td>
            <td id="r5c4"></td>
            <td id="r5c5"></td>
        </tr>

        <tr>
            <td id="r6c1"></td>
            <td id="r6c2"></td>
            <td id="r6c3"></td>
            <td id="r6c4"></td>
            <td id="r6c5"></td>
        </tr>

    </table>

    <section class="response">
        <p id="result"></p>
        <button id="nxtPlayerButton" type="button" onclick="newPlayerButton(); location.href='index.html'">New
            Player</button>
        <button id="next" type="button" onclick="nextButton()">NEXT</button>
    </section>

    <section class="keyboard">
        <div class="keyRow">
            <button id="Q" type="button" onclick="onLetterClicked('Q')">Q</button>
            <button id="W" type="button" onclick="onLetterClicked('W')">W</button>
            <button id="E" type="button" onclick="onLetterClicked('E')">E</button>
            <button id="R" type="button" onclick="onLetterClicked('R')">R</button>
            <button id="T" type="button" onclick="onLetterClicked('T')">T</button>
            <button id="Y" type="button" onclick="onLetterClicked('Y')">Y</button>
            <button id="U" type="button" onclick="onLetterClicked('U')">U</button>
            <button id="I" type="button" onclick="onLetterClicked('I')">I</button>
            <button id="O" type="button" onclick="onLetterClicked('O')">O</button>
            <button id="P" type="button" onclick="onLetterClicked('P')">P</button>
        </div>

        <div class="keyRow">
            <button id="A" type="button" onclick="onLetterClicked('A')">A</button>
            <button id="S" type="button" onclick="onLetterClicked('S')">S</button>
            <button id="D" type="button" onclick="onLetterClicked('D')">D</button>
            <button id="F" type="button" onclick="onLetterClicked('F')">F</button>
            <button id="G" type="button" onclick="onLetterClicked('G')">G</button>
            <button id="H" type="button" onclick="onLetterClicked('H')">H</button>
            <button id="J" type="button" onclick="onLetterClicked('J')">J</button>
            <button id="K" type="button" onclick="onLetterClicked('K')">K</button>
            <button id="L" type="button" onclick="onLetterClicked('L')">L</button>
        </div>

        <div class="keyRow">
            <button id="ENTER" class="longBut" type="button" onclick="onEnterClicked()">ENTER</button>
            <button id="Z" type="button" onclick="onLetterClicked('Z')">Z</button>
            <button id="X" type="button" onclick="onLetterClicked('X')">X</button>
            <button id="C" type="button" onclick="onLetterClicked('C')">C</button>
            <button id="V" type="button" onclick="onLetterClicked('V')">V</button>
            <button id="B" type="button" onclick="onLetterClicked('B')">B</button>
            <button id="N" type="button" onclick="onLetterClicked('N')">N</button>
            <button id="M" type="button" onclick="onLetterClicked('M')">M</button>
            <button id="DEL" class="longBut" type="button" onclick="onDelClicked()">DEL</button>
        </div>
        <br>

        <script src="game.js"></script>
</body>

</html>
